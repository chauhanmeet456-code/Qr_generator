<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QR Code Generator</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Toast -->
    <div id="toast" class="toast">✅ QR Generated Successfully!</div>

    <!-- Loader -->
    <div id="loader" class="loader-container">
      <div class="loader"></div>
      <p>Generating QR...</p>
    </div>

    <main class="container">
      <div class="glass">
        <!-- Left Panel -->

        <section class="left">
          <div class="header">
            <h1>QR Generator</h1>

            <button id="themeBtn" class="theme-btn" type="button">🌙</button>
          </div>

          <p>Create Beautiful QR Codes Instantly</p>

          {% if error %}
          <div class="error-box">{{ error }}</div>
          {% endif %}

          <form id="qrForm" method="POST">
            <div class="form-group">
              <label for="type">Select Type</label>

              <select id="type" name="type">
                <option value="url">🌐 URL</option>

                <option value="text">📝 Text</option>

                <option value="email">📧 Email</option>

                <option value="phone">📞 Phone</option>

                <option value="wifi">📶 Wi-Fi</option>
              </select>
            </div>

            <div id="wifiFields" style="display: none">
              <label>Wi-Fi Name (SSID)</label>
              <input type="text" id="ssid" />

              <label>Password</label>
              <input type="password" id="wifiPassword" />

              <label>Security</label>
              <select id="security">
                <option>WPA</option>
                <option>WPA2</option>
                <option>WEP</option>
                <option>nopass</option>
              </select>
            </div>

            <div class="form-group">
              <label for="dataInput">Enter Data</label>

              <input
                id="dataInput"
                type="text"
                name="data"
                placeholder="Enter here..."
                required
              />
            </div>

            <button id="copyBtn" type="button">
              <i class="fa-solid fa-copy"></i>
              Copy Input
            </button>

            <div class="form-group">
              <label for="size">QR Size</label>

              <input
                id="size"
                type="range"
                min="4"
                max="20"
                value="10"
                name="size"
              />

              <span id="sizeValue">10</span>
            </div>

            <div class="form-group">
              <label>Foreground Color</label>

              <input type="color" name="fill" value="#000000" />
            </div>

            <div class="form-group">
              <label>Background Color</label>

              <input type="color" name="back" value="#ffffff" />
            </div>

            <button class="generate-btn" type="submit">
              <i class="fa-solid fa-qrcode"></i>
              Generate QR
            </button>
          </form>
        </section>

        <!-- Right Panel -->

        <section class="right">
          {% if qr %}

          <div class="preview">
            <img src="{{ qr }}" alt="Generated QR Code" />

            <div class="download-buttons">
              <a href="/download" class="download-btn">
                <i class="fa-solid fa-download"></i>
                PNG
              </a>

              <a href="/download_svg" class="svg-btn">
                <i class="fa-solid fa-file"></i>
                SVG
              </a>
            </div>
          </div>

          {% else %}

          <div class="placeholder">
            <h2>QR Preview</h2>

            <p>Your QR Code will appear here.</p>
          </div>

          {% endif %}
        </section>
      </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
